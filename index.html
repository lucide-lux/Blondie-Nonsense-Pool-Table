<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blondie Nonsense Pool Table</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game">
    <div class="hole" id="hole1"></div>
    <div class="hole" id="hole2"></div>
    <div class="hole" id="hole3"></div>
    <div class="hole" id="hole4"></div>
    <div class="hole" id="hole5"></div>
    <div class="hole" id="hole6"></div>

    <img id="table" src="assets/table.png">

    <div class="hole top-left"></div>
    <div class="hole top-right"></div>
    <div class="hole bottom-left"></div>
    <div class="hole bottom-right"></div>

    <div class="ball" id="ball1"></div>
    <div class="ball" id="ball2"></div>
    <div class="ball" id="ball3"></div>
    <div class="ball" id="specialBall"></div>
    <div id="cue"></div>

  </div>

  <div id="messageBox">
    <p id="messageText"></p>
  </div>

  <script src="script.js"></script>

</body>
</html>
